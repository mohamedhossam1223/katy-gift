        <script>
        const music = document.getElementById('birthdayMusic');
        const musicToggle = document.getElementById('musicToggle');
        let isPlaying = false;

        function toggleMusic() {
            if (isPlaying) {
                music.pause();
                musicToggle.innerText = '🔇';
            } else {
                music.play();
                musicToggle.innerText = '🎵';
            }
            isPlaying = !isPlaying;
        }

        // تشغيل الموسيقى تلقائياً عند أول تفاعل مع الصفحة
        document.body.addEventListener('click', () => {
            if (!isPlaying) {
                music.play().catch(error => console.log("Audio play failed, waiting for interaction."));
                isPlaying = true;
                musicToggle.innerText = '🎵';
            }
        }, { once: true });

        // التحكم اليدوي من الزر
        musicToggle.addEventListener('click', (e) => {
            e.stopPropagation(); // يمنع تداخل الضغطة مع الـ body
            toggleMusic();
        });
    </script>
