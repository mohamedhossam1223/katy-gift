<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Identity Verification | Katy Only 🤫</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Quicksand', sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #fce4ec 0%, #f3e5f5 100%);
            overflow: hidden;
        }

        /* شكل كارت تسجيل الدخول */
        .login-card {
            background: rgba(255, 255, 255, 0.9);
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(255, 105, 180, 0.15);
            text-align: center;
            width: 90%;
            max-width: 400px;
            border: 2px solid #fff;
            backdrop-filter: blur(10px);
            z-index: 10;
        }

        h2 {
            font-family: 'Dancing Script', cursive;
            color: #ff69b4;
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        p {
            color: #888;
            font-size: 0.9rem;
            margin-bottom: 25px;
        }

        .input-group {
            margin-bottom: 15px;
            position: relative;
        }

        input {
            width: 100%;
            padding: 15px 20px;
            border: 2px solid #f0f0f0;
            border-radius: 15px;
            outline: none;
            font-size: 1rem;
            transition: 0.3s;
            text-align: center;
        }

        input:focus {
            border-color: #ff69b4;
            box-shadow: 0 0 10px rgba(255, 105, 180, 0.1);
        }

        /* زرار الدخول الرهيب */
        .login-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(45deg, #ff69b4, #da70d6);
            color: white;
            border: none;
            border-radius: 15px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
            box-shadow: 0 5px 15px rgba(255, 105, 180, 0.3);
        }

        .login-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(255, 105, 180, 0.5);
        }

        /* رسالة الخطأ */
        #errorMessage {
            color: #ff4d4d;
            font-weight: 600;
            margin-top: 20px;
            display: none;
        }

        /* قلوب طايرة في الخلفية */
        .bg-heart {
            position: absolute;
            color: rgba(255, 105, 180, 0.2);
            pointer-events: none;
            z-index: 1;
        }
    </style>
</head>
<body>

    <div class="login-card" id="loginCard">
        <h2>Who are you? ✨</h2>
        <p>This world is locked for a special person...</p>
        
        <div class="input-group">
            <input type="text" id="username" placeholder="Username">
        </div>
        
        <div class="input-group">
            <input type="password" id="password" placeholder="Password">
        </div>
        
        <button class="login-btn" onclick="validateLogin()">Unlock Memories 🔓</button>
        
        <p id="errorMessage">You are not Katy! ❌</p>
    </div>

    <script>
        // 1. توليد قلوب عشوائية في الخلفية
        function createBackgroundHearts() {
            const hearts = ['💖', '🌸', '💕', '✨'];
            for (let i = 0; i < 15; i++) {
                const heart = document.createElement('div');
                heart.className = 'bg-heart';
                heart.innerHTML = hearts[Math.floor(Math.random() * hearts.length)];
                heart.style.left = Math.random() * 100 + 'vw';
                heart.style.top = Math.random() * 100 + 'vh';
                heart.style.fontSize = (Math.random() * 20 + 20) + 'px';
                document.body.appendChild(heart);
                
                // تحريكهم ببطء
                gsap.to(heart, {
                    y: "-=50",
                    x: "+=20",
                    duration: 2 + Math.random() * 2,
                    repeat: -1,
                    yoyo: true,
                    ease: "sine.inOut"
                });
            }
        }

        createBackgroundHearts();

        // 2. التحقق من الدخول
        function validateLogin() {
            const user = document.getElementById('username').value.trim().toLowerCase();
            const pass = document.getElementById('password').value.trim();
            const error = document.getElementById('errorMessage');
            const card = document.getElementById('loginCard');

            // اليوزر والباسورد (عدلهم براحتك هنا)
            const correctUser = "katy";
            const correctPass = "2026";

            if (user === correctUser && pass === correctPass) {
                // أنيميشن النجاح
                gsap.to(card, {
                    scale: 0.8,
                    opacity: 0,
                    duration: 0.8,
                    ease: "back.in",
                    onComplete: () => {
                        // هنا تحط اسم ملف الصفحة التانية اللي فيها الصور والمزيكا
                        window.location.href = "ready.html"; 
                    }
                });
            } else {
                // أنيميشن الفشل (رعشة الكارت)
                error.style.display = "block";
                gsap.fromTo(card, { x: -10 }, { 
                    x: 10, 
                    duration: 0.1, 
                    repeat: 5, 
                    yoyo: true, 
                    onComplete: () => gsap.set(card, { x: 0 }) 
                });
            }
        }

        // لو داس Enter يشتغل برضه
        document.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                validateLogin();
            }
        });
    </script>
</body>
</html>
